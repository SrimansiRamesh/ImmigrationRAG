services:
  - type: web
    name: immigrationiq-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CHAT_MODEL
        sync: false
      - key: GEMINI_CLASSIFIER_MODEL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_COLLECTION_NAME
        sync: false
      - key: COHERE_API_KEY
        sync: false
      - key: EVAL_SERVICE_URL
        sync: false # Set AFTER eval service is deployed

  - type: web
    name: immigrationiq-eval
    runtime: python
    rootDir: eval
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn service:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: AZURE_OPENAI_ENDPOINT
        sync: false
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
        sync: false
      - key: AZURE_OPENAI_API_VERSION
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_CLASSIFIER_MODEL
        sync: false
